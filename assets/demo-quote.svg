<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes blink { 50% { opacity: 0 } }
    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.6 } }
    .term-bg { fill: #1e1e2e; rx: 10; }
    .title-bar { fill: #313244; rx: 10 10 0 0; }
    .btn-close { fill: #f38ba8; }
    .btn-min { fill: #fab387; }
    .btn-max { fill: #a6e3a1; }
    text { font-family: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace; }
    .prompt { fill: #89b4fa; font-size: 14px; }
    .cmd { fill: #cdd6f4; font-size: 14px; }
    .green { fill: #a6e3a1; font-size: 14px; }
    .red { fill: #f38ba8; font-size: 14px; }
    .white { fill: #cdd6f4; font-size: 14px; }
    .dim { fill: #6c7086; font-size: 12px; }
    .price { fill: #f9e2af; font-size: 22px; font-weight: bold; }
    .cursor { fill: #cdd6f4; animation: blink 1s step-end infinite; }
    .live { fill: #a6e3a1; animation: pulse 2s ease-in-out infinite; }
  </style>

  <rect class="term-bg" width="720" height="300" />
  <rect class="title-bar" width="720" height="36" />
  <circle class="btn-close" cx="20" cy="18" r="6" />
  <circle class="btn-min" cx="40" cy="18" r="6" />
  <circle class="btn-max" cx="60" cy="18" r="6" />
  <text x="340" y="23" text-anchor="middle" fill="#cdd6f4" font-size="13">finclaw — quotes</text>

  <!-- Command 1: Crypto -->
  <text class="prompt" x="20" y="65">$</text>
  <text class="cmd" x="35" y="65">finclaw quote BTC/USDT</text>
  <text class="price" x="20" y="100">BTC/USDT  $68,848.50</text>
  <text class="red" x="340" y="100">  -3.41%</text>
  <text class="dim" x="20" y="120">Bid: 68,846.00  Ask: 68,846.10  Vol: 455,956,845</text>
  <text class="live" x="580" y="120">● LIVE via OKX</text>

  <!-- Command 2: Stock -->
  <text class="prompt" x="20" y="160">$</text>
  <text class="cmd" x="35" y="160">finclaw quote AAPL</text>
  <text class="price" x="20" y="195">AAPL  $189.84</text>
  <text class="green" x="240" y="195">  +1.23%</text>
  <text class="dim" x="20" y="215">Open: 187.52  High: 190.45  Low: 186.91  Vol: 52.3M</text>

  <!-- Command 3: A-share -->
  <text class="prompt" x="20" y="255">$</text>
  <text class="cmd" x="35" y="255">finclaw cn-realtime 600519</text>
  <text class="dim" x="20" y="275">Kweichow Moutai  ¥1,689.00  +0.84%  Vol: 12,847</text>

  <rect class="cursor" x="20" y="282" width="8" height="14" />
</svg>
