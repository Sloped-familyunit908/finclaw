<svg viewBox="0 0 820 580" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes typing { from { width: 0 } to { width: 100% } }
    @keyframes blink { 50% { opacity: 0 } }
    @keyframes fadeIn1 { 0%,15% { opacity:0 } 20%,100% { opacity:1 } }
    @keyframes fadeIn2 { 0%,30% { opacity:0 } 35%,100% { opacity:1 } }
    @keyframes fadeIn3 { 0%,50% { opacity:0 } 55%,100% { opacity:1 } }
    @keyframes fadeIn4 { 0%,70% { opacity:0 } 75%,100% { opacity:1 } }
    .term-bg { fill: #1e1e2e; rx: 10; }
    .title-bar { fill: #313244; rx: 10 10 0 0; }
    .btn-close { fill: #f38ba8; }
    .btn-min { fill: #fab387; }
    .btn-max { fill: #a6e3a1; }
    text { font-family: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace; }
    .prompt { fill: #89b4fa; font-size: 13px; }
    .cmd { fill: #cdd6f4; font-size: 13px; }
    .comment { fill: #6c7086; font-size: 13px; }
    .header { fill: #f9e2af; font-size: 13px; font-weight: bold; }
    .green { fill: #a6e3a1; font-size: 13px; }
    .red { fill: #f38ba8; font-size: 13px; }
    .blue { fill: #89b4fa; font-size: 13px; }
    .white { fill: #cdd6f4; font-size: 13px; }
    .dim { fill: #6c7086; font-size: 13px; }
    .orange { fill: #fab387; font-size: 13px; }
    .pink { fill: #f5c2e7; font-size: 13px; }
    .cursor { fill: #cdd6f4; animation: blink 1s step-end infinite; }
    .s1 { animation: fadeIn1 12s infinite; }
    .s2 { animation: fadeIn2 12s infinite; }
    .s3 { animation: fadeIn3 12s infinite; }
    .s4 { animation: fadeIn4 12s infinite; }
  </style>

  <!-- Terminal window -->
  <rect class="term-bg" width="820" height="580" />
  <rect class="title-bar" width="820" height="36" />
  <circle class="btn-close" cx="20" cy="18" r="6" />
  <circle class="btn-min" cx="40" cy="18" r="6" />
  <circle class="btn-max" cx="60" cy="18" r="6" />
  <text x="380" y="23" text-anchor="middle" fill="#cdd6f4" font-size="13">finclaw — terminal</text>

  <!-- Command line -->
  <text class="prompt" x="20" y="65">$</text>
  <text class="cmd" x="35" y="65">finclaw evolve --market crypto --generations 50</text>

  <!-- Stage 1: Loading -->
  <g class="s1">
    <text class="header" x="20" y="95">🧬 FinClaw Evolution Engine v4</text>
    <text class="dim" x="20" y="115">Walk-Forward + Smart Evolution + 484-dim Factors</text>
    <text class="white" x="20" y="145">Market: crypto | Population: 30 | Generations: 50</text>
    <text class="blue" x="20" y="165">[factors] loaded 484 dynamic factors</text>
    <text class="green" x="20" y="185">[data] 17/17 coins valid, avg 17520 bars each</text>
  </g>

  <!-- Stage 2: Evolution running -->
  <g class="s2">
    <text class="header" x="20" y="215">━━━ Generation Progress ━━━</text>
    <text class="white" x="20" y="240">Gen   1 │ fitness=   12.4 │ return=  34.2% │ dd=18.3% │ sharpe=1.24</text>
    <text class="white" x="20" y="260">Gen   5 │ fitness=   45.8 │ return=  89.7% │ dd=14.1% │ sharpe=2.31</text>
    <text class="green" x="20" y="280">Gen  10 │ fitness=  112.3 │ return= 156.4% │ dd=11.2% │ sharpe=3.45</text>
    <text class="green" x="20" y="300">Gen  20 │ fitness=  234.7 │ return= 312.8% │ dd= 9.8% │ sharpe=4.12</text>
    <text class="orange" x="20" y="320">  ↑ New best! OOS validated across 4 time windows</text>
  </g>

  <!-- Stage 3: Walk-forward results -->
  <g class="s3">
    <text class="header" x="20" y="350">━━━ Walk-Forward Validation ━━━</text>
    <text class="blue" x="20" y="375">Window 1 [Jan-Mar]: IS=312% OOS= 89%  ✓ consistent</text>
    <text class="blue" x="20" y="395">Window 2 [Apr-Jun]: IS=298% OOS=102%  ✓ consistent</text>
    <text class="blue" x="20" y="415">Window 3 [Jul-Sep]: IS=334% OOS= 76%  ✓ consistent</text>
    <text class="blue" x="20" y="435">Window 4 [Oct-Dec]: IS=321% OOS= 94%  ✓ consistent</text>
    <text class="green" x="20" y="460">Overfit ratio: 0.82 (healthy — OOS tracks IS)</text>
    <text class="green" x="20" y="480">Deflated Sharpe: p=0.023 (statistically significant)</text>
  </g>

  <!-- Stage 4: Summary -->
  <g class="s4">
    <text class="header" x="20" y="510">━━━ Best Strategy DNA ━━━</text>
    <text class="pink" x="20" y="535">Gen 20 │ 172 active factors │ Sharpe 4.12 │ Max DD 9.8%</text>
    <text class="green" x="20" y="555">Saved → evolution_results_crypto/best_ever.json</text>
    <rect class="cursor" x="20" y="562" width="8" height="14" />
  </g>
</svg>
