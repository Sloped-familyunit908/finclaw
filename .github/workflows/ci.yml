name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src/ --select E,F,W --ignore E501,E402,F401,F841 --exit-zero

      - name: Secret & PII scan
        run: |
          python -c "
          import re, sys, pathlib
          patterns = []
          for pf in ['.secret-patterns', '.secret-patterns.local']:
              p = pathlib.Path(pf)
              if p.exists():
                  patterns.extend(l.strip() for l in p.read_text().splitlines() if l.strip() and not l.startswith('#'))
          if not patterns:
              print('No patterns found'); sys.exit(0)
          violations = []
          skip_files = {'.secret-patterns', '.secret-patterns.local', '.pre-commit-config.yaml', 'ci.yml'}
          for f in pathlib.Path('.').rglob('*'):
              if f.is_file() and f.name not in skip_files and '.git' not in f.parts and 'node_modules' not in f.parts and '__pycache__' not in f.parts:
                  if f.suffix in ('.py','.ts','.tsx','.js','.md','.json','.yaml','.yml','.toml','.txt','.html','.css'):
                      try:
                          for i, line in enumerate(f.read_text(errors='ignore').splitlines(), 1):
                              for pat in patterns:
                                  if re.search(pat, line, re.IGNORECASE):
                                      violations.append(f'{f}:{i}: [{pat}]')
                      except: pass
          if violations:
              print('SECRET/PII SCAN FAILED:')
              for v in violations[:30]: print(f'  {v}')
              sys.exit(1)
          print('Secret scan passed: 0 violations')
          "

      - name: Run tests
        env:
          PYTHONPATH: scripts:.
        run: |
          pytest tests/ -x -q --tb=short -k "not integration and not websocket and not deep_qa" 2>&1 | head -100

      - name: Run tests with coverage
        env:
          PYTHONPATH: scripts:.
        run: |
          pytest tests/ --cov=src --cov-report=xml --cov-report=term-missing -k "not integration and not websocket and not deep_qa" --timeout=300 || true
