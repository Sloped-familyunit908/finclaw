# WhaleTrader Strategy: RSI Mean Reversion
# Buy oversold, sell overbought

apiVersion: whale/v1
kind: Strategy

metadata:
  name: rsi-mean-reversion
  version: 1.0.0
  author: whale-trader
  description: >
    Mean reversion strategy using RSI. Buys when RSI drops below 30
    (oversold) and sells when RSI rises above 70 (overbought).
    AI sentiment analysis prevents buying into real crashes.
  tags:
    - crypto
    - mean-reversion
    - ai-enhanced
  license: MIT

spec:
  assets:
    type: crypto
    symbols:
      - BTC
      - ETH

  timeframe: 4h

  agents:
    - momentum
    - sentiment

  entry:
    rules:
      - indicator: rsi
        period: 14
        condition: below
        threshold: 30

      - indicator: bollinger
        period: 20
        condition: below_lower

    ai_confirm: true
    ai_min_confidence: 0.5

  exit:
    take_profit: 0.08
    stop_loss: 0.04
    trailing_stop: 0.02
    max_hold_days: 14

  risk:
    max_position_pct: 0.15
    max_positions: 3
    max_daily_loss_pct: 0.03
    max_drawdown_pct: 0.10
