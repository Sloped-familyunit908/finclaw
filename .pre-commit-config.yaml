# Pre-commit hooks for FinClaw
# Install: pip install pre-commit && pre-commit install
# Manual run: pre-commit run --all-files

repos:
  # Ruff — fast Python linter & formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        name: ruff check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: ruff format

  # Quick smoke test — run fast tests only
  - repo: local
    hooks:
      - id: pytest-smoke
        name: pytest smoke
        entry: python -m pytest tests/ -x -q --tb=short -k "not integration and not slow"
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: secret-scan
        name: secret & PII scan
        entry: python -c "
import re, sys, pathlib

patterns = []
for pf in ['.secret-patterns', '.secret-patterns.local']:
    p = pathlib.Path(pf)
    if p.exists():
        patterns.extend(l.strip() for l in p.read_text().splitlines() if l.strip() and not l.startswith('#'))

if not patterns:
    sys.exit(0)

violations = []
for f in sys.argv[1:]:
    try:
        content = pathlib.Path(f).read_text(errors='ignore')
        for i, line in enumerate(content.splitlines(), 1):
            for pat in patterns:
                if re.search(pat, line, re.IGNORECASE):
                    violations.append(f'{f}:{i}: matches [{pat}]')
    except Exception:
        pass

if violations:
    print('SECRET/PII SCAN FAILED:')
    for v in violations[:20]:
        print(f'  {v}')
    if len(violations) > 20:
        print(f'  ... and {len(violations) - 20} more')
    sys.exit(1)
"
        language: system
        types: [text]
        exclude: '(\.git/|node_modules/|__pycache__|\.secret-patterns)'
        stages: [pre-commit]
