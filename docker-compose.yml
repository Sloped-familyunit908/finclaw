services:
  finclaw:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - FINCLAW_DATA_DIR=/app/data
      - FINCLAW_PORT=8080
      - FINCLAW_HOST=0.0.0.0
      - FINCLAW_LOG_LEVEL=info
    restart: unless-stopped
    command: ["python", "finclaw.py", "info"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  finclaw-api:
    build: .
    ports:
      - "8081:8080"
    volumes:
      - ./data:/app/data
    environment:
      - FINCLAW_DATA_DIR=/app/data
      - FINCLAW_PORT=8080
      - FINCLAW_HOST=0.0.0.0
      - FINCLAW_LOG_LEVEL=info
    restart: unless-stopped
    command: ["python", "-m", "src.api.server"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
